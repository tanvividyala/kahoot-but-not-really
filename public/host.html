<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toohak! — Host</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .host-full { display: flex; flex-direction: column; min-height: 100vh; }
    .host-body { flex: 1; display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 20px; align-items: start; align-content: start; }
    [data-view="results"] .host-body { flex: none; }
    .host-main { display: flex; flex-direction: column; gap: 16px; }
    .host-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .h-card { background: var(--card); border: 1.5px solid var(--card-border); border-radius: 12px; padding: 20px; box-shadow: 0 1px 8px rgba(28,56,40,0.06); }
    .host-topbar { background: var(--bg-dark); padding: 12px 20px; display: flex; align-items: center; gap: 16px; color: #fff; }
    .host-topbar .code-pill { background: rgba(255,255,255,0.18); border-radius: 50px; padding: 6px 16px; font-weight: 900; font-size: 1rem; letter-spacing: 0.1em; color: #fff; }
    .host-topbar .title { font-weight: 900; font-size: 1.1rem; flex: 1; color: #fff; }
    @media (max-width: 768px) { .host-body { grid-template-columns: 1fr; } }
    [data-view] { display: none; }
    [data-view].active { display: flex; flex-direction: column; }
    .q-type-badge { display: inline-block; background: var(--bg); border: 1.5px solid var(--card-border); color: var(--text-muted); border-radius: 50px; padding: 4px 12px; font-size: 0.8rem; font-weight: 700; margin-bottom: 12px; }
    .big-answer { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; margin-bottom: 10px; font-weight: 600; color: #fff; }
  </style>
</head>
<body>
<div class="host-full">

  <!-- LOBBY VIEW -->
  <div data-view="lobby" class="active center" style="padding: 32px;">
    <div style="text-align:center; margin-bottom: 32px;">
      <div class="logo">Toohak!</div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; max-width: 800px;">
      <!-- Code card -->
      <div class="h-card" style="text-align:center;">
        <div style="font-size:0.8rem; font-weight:700; opacity:0.6; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px;">Game PIN</div>
        <div id="lobbyCode" style="font-size:4rem; font-weight:900; letter-spacing:0.15em; color:var(--text); line-height:1;"></div>
        <div style="font-size:0.8rem; color:var(--text-muted); margin-top:8px;">Players go to: <strong id="joinUrl"></strong></div>
        <div style="margin-top:16px; background:var(--bg); border:1.5px solid var(--card-border); border-radius:8px; padding:8px 12px; font-size:0.85rem; color:var(--text-muted);">
          Share this PIN with your class
        </div>
      </div>

      <!-- Player list -->
      <div class="h-card">
        <div class="player-count-badge" id="playerCountBadge">0 players joined</div>
        <div class="player-grid" id="playerGrid"></div>
      </div>
    </div>

    <div style="margin-top: 32px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <button id="startBtn" class="btn btn-start" disabled>
        Start Game
      </button>
      <div style="font-size:0.85rem; opacity:0.6;" id="startHint">Waiting for at least 1 player...</div>
    </div>
  </div>

  <!-- QUESTION VIEW (host) — mirrors player layout -->
  <div data-view="question" style="flex:1;">
    <div class="host-topbar">
      <div class="title">Host View</div>
      <div class="code-pill" id="hostCodePill"></div>
      <div id="answerCountDisplay" style="font-size:0.9rem; color:rgba(255,255,255,0.75);"></div>
      <button class="btn btn-skip" id="skipToResultsBtn" style="margin-left:auto; padding:8px 16px; font-size:0.85rem;">Skip to Results</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; padding:16px; gap:12px;">
      <div class="timer-bar-wrap"><div class="timer-bar" id="hostTimerBar"></div></div>
      <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.85rem; color:var(--text-muted);">
        <span id="hostQProgress"></span>
        <span id="hostTimerNum" style="font-size:1.5rem; font-weight:900; color:var(--text);"></span>
      </div>
      <div class="question-box">
        <div class="question-text" id="hostQuestionText"></div>
        <img id="hostQuestionImage" class="question-image" style="display:none;" />
        <div class="multi-hint" id="hostQTypeBadge"></div>
      </div>
      <div class="answer-grid" id="hostAnswerGrid" style="pointer-events:none; flex:1;"></div>
    </div>
  </div>

  <!-- RESULTS VIEW (host) — Kahoot-style -->
  <div data-view="results" style="flex:1;">
    <div class="host-topbar">
      <div class="title">Results</div>
      <div class="code-pill" id="hostCodePill2"></div>
      <div id="correctStats" style="font-size:0.85rem; color:rgba(255,255,255,0.75);"></div>
      <button class="btn btn-next" id="nextBtn" style="margin-left:auto; width:auto; padding:10px 20px; font-size:0.95rem; border-radius:10px;">See Leaderboard</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; padding:12px 16px; gap:12px; overflow-y:auto;">
      <div class="question-box" style="padding:16px 24px;">
        <div class="question-text" id="resultsQuestionText"></div>
      </div>
      <div id="barChart" style="display:flex; align-items:flex-end; justify-content:center; gap:8px; padding:0 24px; min-height:160px; flex-shrink:0;"></div>
      <div class="answer-grid" id="resultsAnswerGrid" style="pointer-events:none;"></div>
      <div id="explanationBox" style="display:none; padding:12px 16px; background:var(--card); border:1.5px solid var(--card-border); border-radius:10px; font-size:0.95rem; color:var(--text-muted); line-height:1.6;"></div>
    </div>
  </div>

  <!-- LEADERBOARD VIEW (host) -->
  <div data-view="leaderboard" style="flex:1;">
    <div class="host-topbar">
      <div class="title">Leaderboard</div>
      <div class="code-pill" id="hostCodePill3"></div>
      <button class="btn btn-next" id="nextFromLbBtn" style="margin-left:auto; width:auto; padding:10px 20px; font-size:0.95rem; border-radius:10px;">Next Question</button>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; padding:24px 16px; gap:0; overflow-y:auto;">
      <div id="nextBtnHint" style="font-size:0.8rem; color:var(--text-muted); margin-bottom:16px;"></div>
      <div class="leaderboard" id="resultsLeaderboard" style="max-width:520px; width:100%;"></div>
    </div>
  </div>

  <!-- END VIEW (host) -->
  <div data-view="end" class="center" style="text-align:center; padding:40px;">
    <div class="final-title" style="margin:0 0 8px;">Game Over!</div>
    <div style="color:var(--text-muted); margin-bottom:32px;">Thanks for playing!</div>
    <div class="leaderboard" id="finalLeaderboard" style="max-width:480px;"></div>
    <button onclick="location.href='/host'" class="btn btn-ghost" style="margin-top:24px;">Play Again</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const SHAPES = ['▲', '♦', '●', '■', '★'];
const COLORS = ['color-0','color-1','color-2','color-3','color-4'];
const COLORS_CSS = ['var(--red)','var(--blue)','var(--yellow)','var(--green)','var(--orange)'];
const TYPE_LABELS = { single: 'Single Choice', truefalse: 'True / False', multiple: 'Multi-Select' };

let gameCode = '';
let currentQuestion = null;
let timerInterval = null;
let playerCount = 0;

// ── View ──
function show(name) {
  document.querySelectorAll('[data-view]').forEach(el => el.classList.remove('active'));
  const v = document.querySelector(`[data-view="${name}"]`);
  if (v) v.classList.add('active');
}

// ── Create game on load ──
socket.emit('host:create', ({ code }) => {
  gameCode = code;
  document.getElementById('lobbyCode').textContent = code;
  document.getElementById('hostCodePill').textContent = code;
  document.getElementById('hostCodePill2').textContent = code;
  document.getElementById('hostCodePill3').textContent = code;
  document.getElementById('joinUrl').textContent = 'toohak.up.railway.app/play';
});

// ── Lobby ──
document.getElementById('startBtn').addEventListener('click', () => {
  if (playerCount === 0) return;
  socket.emit('host:start', { code: gameCode });
});

socket.on('player:joined', ({ name, count }) => {
  playerCount = count;
  updatePlayerDisplay(name, count);
});

socket.on('player:left', ({ name, count }) => {
  playerCount = count;
  document.getElementById('playerCountBadge').textContent = `${count} player${count !== 1 ? 's' : ''} joined`;
  // Remove chip (simple: just rebuild or ignore since this is edge case)
});

function updatePlayerDisplay(newName, count) {
  const badge = document.getElementById('playerCountBadge');
  badge.textContent = `${count} player${count !== 1 ? 's' : ''} joined`;

  const startBtn = document.getElementById('startBtn');
  const startHint = document.getElementById('startHint');
  startBtn.disabled = count === 0;
  startHint.textContent = count > 0 ? `${count} player${count !== 1 ? 's' : ''} ready!` : 'Waiting for at least 1 player...';

  if (newName) {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.textContent = newName;
    document.getElementById('playerGrid').appendChild(chip);
  }
}

// ── Question (host) ──
socket.on('question:show', q => {
  currentQuestion = q;

  document.getElementById('hostQTypeBadge').textContent = q.type === 'multiple' ? 'Select all that apply' : '';
  document.getElementById('hostQProgress').textContent = `Question ${q.index + 1} / ${q.total}`;
  document.getElementById('hostQuestionText').textContent = q.question;
  document.getElementById('answerCountDisplay').textContent = `0 / ${playerCount} answered`;

  const img = document.getElementById('hostQuestionImage');
  if (q.image) { img.src = q.image; img.style.display = 'block'; }
  else { img.style.display = 'none'; }

  // Build answer grid — identical to guest view, non-interactive
  const grid = document.getElementById('hostAnswerGrid');
  grid.className = 'answer-grid' + (q.options.length === 2 ? ' two-options' : '');
  grid.innerHTML = q.options.map((opt, i) => `
    <button class="answer-btn ${COLORS[i]}" style="pointer-events:none;">
      <span class="shape">${SHAPES[i]}</span>
      <span class="answer-text">${esc(opt)}</span>
    </button>
  `).join('');

  startHostTimer(q.timeLimit);
  show('question');
});

function startHostTimer(seconds) {
  clearInterval(timerInterval);
  let remaining = seconds;
  const bar = document.getElementById('hostTimerBar');
  const num = document.getElementById('hostTimerNum');

  bar.style.transition = 'none';
  bar.style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${seconds}s linear`;
    bar.style.width = '0%';
  }));

  num.textContent = remaining;
  timerInterval = setInterval(() => {
    remaining--;
    num.textContent = Math.max(0, remaining);
    if (remaining <= 0) clearInterval(timerInterval);
  }, 1000);
}

socket.on('answer:count', ({ count, total }) => {
  document.getElementById('answerCountDisplay').textContent = `${count} / ${total} answered`;
});

document.getElementById('skipToResultsBtn').addEventListener('click', () => {
  socket.emit('host:next', { code: gameCode });
});

// ── Results (host) ──
socket.on('results:show', data => {
  clearInterval(timerInterval);
  const q = currentQuestion;
  if (!q) return;

  document.getElementById('resultsQuestionText').textContent = q.question;
  document.getElementById('correctStats').textContent =
    `${data.correctCount} / ${data.totalAnswered} correct`;

  // Vertical bar chart — bars grow upward, heights proportional to count
  const maxCount = Math.max(...Object.values(data.tally), 1);
  const MAX_H = 140;
  const barChart = document.getElementById('barChart');
  barChart.innerHTML = q.options.map((opt, i) => {
    const count = data.tally[i] || 0;
    const h = Math.max(4, Math.round((count / maxCount) * MAX_H));
    const isCorrect = Array.isArray(data.correctAnswer) ? data.correctAnswer.includes(i) : data.correctAnswer === i;
    return `
      <div class="bar-col">
        <div class="bar-check" style="color:${COLORS_CSS[i]}; visibility:${isCorrect ? 'visible' : 'hidden'};">✓</div>
        <div class="bar-count" style="color:${COLORS_CSS[i]};">${count}</div>
        <div class="bar-fill" style="height:0; background:${COLORS_CSS[i]}; border-radius:6px 6px 0 0;" data-h="${h}"></div>
        <div class="bar-chip" style="background:${COLORS_CSS[i]};">${SHAPES[i]}</div>
      </div>
    `;
  }).join('');
  setTimeout(() => {
    barChart.querySelectorAll('.bar-fill').forEach(el => {
      el.style.height = el.dataset.h + 'px';
    });
  }, 50);

  // Answer grid — correct = full opacity + ✓, wrong = dimmed
  const resultsGrid = document.getElementById('resultsAnswerGrid');
  resultsGrid.className = 'answer-grid' + (q.options.length === 2 ? ' two-options' : '');
  resultsGrid.innerHTML = q.options.map((opt, i) => {
    const isCorrect = Array.isArray(data.correctAnswer) ? data.correctAnswer.includes(i) : data.correctAnswer === i;
    return `
      <button class="answer-btn ${COLORS[i]}" style="pointer-events:none; opacity:${isCorrect ? '1' : '0.45'};">
        <span class="shape">${SHAPES[i]}</span>
        <span class="answer-text">${esc(opt)}</span>
        ${isCorrect ? '<span style="margin-left:auto; font-size:1.4rem; font-weight:900;">✓</span>' : ''}
      </button>
    `;
  }).join('');

  // Explanation (clearly labelled)
  const box = document.getElementById('explanationBox');
  if (data.explanation) {
    box.innerHTML = `<span style="font-weight:800; color:var(--text); text-transform:uppercase; font-size:0.72rem; letter-spacing:0.07em;">Explanation</span><br>${esc(data.explanation)}`;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }

  // Store for leaderboard view
  pendingLeaderboard = data.leaderboard;
  pendingIsLast = q.index + 1 >= q.total;

  show('results');
});

let pendingLeaderboard = [];
let pendingIsLast = false;

// Results → show leaderboard view
document.getElementById('nextBtn').addEventListener('click', () => {
  document.getElementById('resultsLeaderboard').innerHTML = renderLeaderboard(pendingLeaderboard);
  document.getElementById('nextBtnHint').textContent = pendingIsLast
    ? 'This was the last question'
    : `Question ${currentQuestion.index + 2} of ${currentQuestion.total} next`;
  document.getElementById('nextFromLbBtn').textContent = pendingIsLast ? 'See Final Results' : 'Next Question';
  show('leaderboard');
});

// Leaderboard → advance game
document.getElementById('nextFromLbBtn').addEventListener('click', () => {
  socket.emit('host:next', { code: gameCode });
});

// ── End ──
socket.on('game:end', ({ leaderboard }) => {
  document.getElementById('finalLeaderboard').innerHTML = renderLeaderboard(leaderboard);
  show('end');
});

// ── Helpers ──
function renderLeaderboard(list) {
  const rankClass = ['gold','silver','bronze'];
  return list.map((p, i) => `
    <div class="lb-row">
      <span class="lb-rank ${rankClass[i] || ''}">#${i+1}</span>
      <span class="lb-name">${esc(p.name)}</span>
      <span class="lb-score">${p.score.toLocaleString()}</span>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
